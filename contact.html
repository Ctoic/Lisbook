      <div

        role="status"
        style="width: 4rem; height: 4rem; color: #1db954"

    <!-- Navbar -->
    <!-- <div id="header-placeholder" class="sticky top-0 z-20"></div> -->
    <header class="sticky top-0 z-20 bg-gray-800 p-4 shadow-sm">
      <nav class="">
        <div class="container mx-auto flex justify-between items-center">
          <!-- Logo -->
          <a class="logo-text h3 font-bold d-inline-flex" href="/">

          <!-- Menu Links and Theme Toggle -->

            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-6 w-6"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M6 18L18 6M6 6l12 12"
                />
              </svg>
            </div>
            <a
              class="text-gray-300 hover:text-green-500"
              href="/"
              id="home.html"
              >Home</a
            >
            <a
              class="text-gray-300 hover:text-green-500"
              href="/about.html"
              id="about"
              >About</a
            >

            <a class="text-gray-300 hover:text-green-500" href="/contact.html"
              >Contact</a
            >
            <a class="text-gray-300 hover:text-green-500" href="/faq.html"
              >FAQs</a
            >

            <!-- Profile Icon and Theme Toggle -->
            <button
              id="theme-toggle"
              class="text-gray-300 hover:text-green-500"
            >
              <!-- Sun Icon (for dark theme) -->
              <svg
                id="sun-icon"
                xmlns="http://www.w3.org/2000/svg"
                class="h-6 w-6 hidden"
                fill="none"
                viewBox="0 0 24 24"

              >

              <!-- Moon Icon (for light theme) -->

    <!-- Social Share Modal -->
    <div
      class="modal fade"
      id="exampleModalToggle"
      aria-hidden="true"
      aria-labelledby="exampleModalToggleLabel"
      tabindex="-1"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="exampleModalToggleLabel">
              Share it on :
            </h1>
            <button
              type="button"
              class="btn-close rounded-5"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <!-- Modale body -->
          <div class="modal-body">
            <div class="flex justify-center space-x-4 mt-4">
              <a
                href="https://www.facebook.com/sharer/sharer.php?u=http://127.0.0.1:5500/Lisbook/pbd.html&text=Lisbook+god Delusion"
                target="_blank"
              >
                <img
                  src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg"
                  alt="Share on Facebook"
                  style="width: 24px; height: 24px"
                />
              </a>
              <a
                href="https://twitter.com/intent/tweet?url=http://127.0.0.1:5500/Lisbook/pbd.html&text=Lisbook+god Delusion"
                target="_blank"
              >
                <img
                  src="https://abs.twimg.com/favicons/twitter.2.ico"
                  alt="Share on X"
                />
              </a>
              <a
                href="https://api.whatsapp.com/send?text=http://127.0.0.1:5500/Lisbook/pbd.html"
                target="_blank"
              >
                <img
                  src="https://cdn3.iconfinder.com/data/icons/social-media-2169/24/social_media_social_media_logo_whatsapp-512.png"
                  alt="Share on WhatsApp"
                  style="width: 24px; height: 24px"
                />
              </a>
            </div>
          </div>
          <!-- <div class="modal-footer">
            <button
              class="btn btn-primary"

            >
              Open second modal
            </button>
          </div> -->
        </div>
      </div>
    </div>
    <!-- Social Share Modal end -->

    <main class="container my-5">
      <!-- Feedback Section -->

      <section class="row d-flex align-items-stretch rounded-5 p-5">
        <div class="container mx-auto p-6 rounded-lg">
          <h2 class="display-5 page-title fw-semibold mb-5 text-center">
            Share Your Feedback
          </h2>
          <form id="feedback-form" class="space-y-4">
            <div>
              <label for="username" class="block text-sm font-medium"
                >Your Name:</label
              >
              <input
                type="text"
                name="username"
                autocomplete="off"
                id="username"
                class="w-full p-2 rounded-lg bg-gray-700 text-white mt-2"
                required
              />
            </div>
            <div>
              <label for="username" class="block text-sm font-medium"
                >Your Email:</label
              >
              <input
                type="email"
                id="email"
                name="email"
                autocomplete="off"
                class="w-full p-2 rounded-lg bg-gray-700 text-white mt-2"
                required
              />
            </div>

            <label for="comment" class="block text-sm font-medium"
              >Your Feedback:</label
            >
            <textarea
              id="feedback"
              name="feedback"
              autocomplete="off"
              class="w-full p-2 rounded-lg bg-gray-700 text-white mt-2"
              rows="4"
              required
            ></textarea>
            <div class="text-center mt-5">
              <button
                type="submit"
                class="bg-green-500 text-white py-2 px-6 rounded-full hover:bg-green-600"
                id="share2"
              >
                Share Feedback
              </button>
            </div>
          </form>
        </div>
      </section>
    </main>
    <!-- Footer -->
    <div id="footer-placeholder"></div>
    <script src="./js/script.js" type="module"></script>
